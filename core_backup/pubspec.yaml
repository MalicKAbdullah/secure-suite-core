name: core_backup
description: >-
  Shared scheduled-backup engine for Secure Suite apps: interval policy, a
  Storage Access Framework folder destination (incl. Google Drive folders), a
  data-agnostic backup service, and a consistent Settings section.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  core_storage:
    path: ../core_storage
  core_theme:
    path: ../core_theme

  path_provider: ^2.1.3
  saf_util: ^0.9.0
  saf_stream: ^0.10.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
