name: core_update
description: >-
  Shared in-app update for sideloaded Secure Suite apps: on open it asks the
  app's GitHub repo for the latest release, and if newer surfaces a clean,
  dismissable card. "Update now" downloads the APK and hands it to Android's
  package installer (needs REQUEST_INSTALL_PACKAGES). The only network calls
  are the release check and the APK download; nothing is uploaded.
version: 0.2.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  core_theme:
    path: ../core_theme
  core_ui:
    path: ../core_ui

  http: ^1.2.0
  url_launcher: ^6.2.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
