name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    name: ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [core_crypto, core_storage, core_security, core_theme, core_ui]
    defaults:
      run:
        working-directory: ${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.3
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze (zero tolerance)
        run: dart analyze --fatal-infos
      - name: Test
        run: if [ -d test ]; then flutter test; else echo "no tests in ${{ matrix.pkg }}"; fi
